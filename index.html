<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPORAN I - Pro + Media</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 10px; margin: 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; max-width: 500px; margin: 10px auto; }
        .header { text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #888; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-add-list { background: #3498db; color: white; }
        .btn-kirim { background: #27ae60; color: white; margin-top: 20px; }
        .btn-secondary { background: #444; color: white; font-size: 12px; padding: 8px; }
        
        /* Modal Style */
        #modalNama { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; overflow-y: auto; }
        .modal-content { background:#1e1e1e; padding:20px; border-radius:12px; max-width:400px; margin:40px auto; border: 1px solid #444; }
        .existing-names { margin-top: 15px; padding: 10px; background: #252525; border-radius: 8px; max-height: 200px; overflow-y: auto; }
        .name-tag { display: inline-flex; align-items: center; background: #333; padding: 5px 10px; border-radius: 20px; margin: 4px; font-size: 12px; }
        .del-name-btn { margin-left: 8px; color: #ff4d4d; cursor: pointer; font-weight: bold; }
        
        /* Antrean Style */
        .antrean-container { margin-top: 25px; border-top: 2px dashed #333; padding-top: 15px; }
        .item-antrean { background: #252525; padding: 12px; border-radius: 8px; margin-bottom: 10px; position: relative; border-left: 5px solid #3498db; }
        .btn-hapus { position: absolute; right: 10px; top: 12px; background: #c0392b; color: white; padding: 5px 10px; font-size: 10px; width: auto; margin: 0; }
        
        /* Preview Image */
        #previewContainer { margin-top: 10px; display: none; text-align: center; }
        #previewImg { max-width: 120px; border-radius: 8px; border: 1px solid #555; }
    </style>
</head>
<body>

<div id="modalNama">
    <div class="modal-content">
        <h2 style="margin-top:0;">Daftar Anggota</h2>
        <p style="font-size:11px; color:#888;">Nama yang terdaftar di BECOMM saat ini:</p>
        <div class="existing-names"><div id="listNamaEksis">Memuat...</div></div>
        
        <label>Tambah Nama Baru</label>
        <textarea id="bulkNama" rows="3" placeholder="Gunakan Enter untuk baris baru"></textarea>
        <button id="btnSimpanNama" onclick="simpanNamaMassal()" style="background:#27ae60; color:white;">SIMPAN KE DATABASE</button>
        <button onclick="tutupModal()" class="btn-secondary">TUTUP / SELESAI</button>
    </div>
</div>

<div class="card">
    <div class="header">
        <h3 id="displayBecomm" onclick="gantiBecomm()" style="color:#3498db; cursor:pointer; margin-bottom:0;">MEMUAT...</h3>
        <small style="color:#555; font-size:9px;">(Klik nama di atas untuk ganti BECOMM)</small>
        <br>
        <button onclick="bukaModal()" class="btn-secondary" style="margin-top:15px;">+ Daftar Anggota</button>
    </div>

    <label>TANGGAL</label>
    <input type="date" id="tanggal">

    <label>PILIH NAMA</label>
    <select id="namaDropdown">
        <option value="">-- Pilih Nama --</option>
    </select>

    <label>JUMLAH (Rp)</label>
    <input type="number" id="nabung" placeholder="Contoh: 50000">

    <label>PEMBAYARAN</label>
    <select id="pembayaran" onchange="toggleUpload(this.value)">
        <option value="TRANSFER">TRANSFER (Butuh Bukti)</option>
        <option value="CASH">CASH</option>
    </select>

    <div id="uploadSection">
        <label>📸 BUKTI TRANSFER</label>
        <input type="file" id="fileInput" accept="image/*" onchange="handlePreview(this)">
        <div id="previewContainer">
            <img id="previewImg" src="">
            <br><small onclick="resetFile()" style="color:red; cursor:pointer;">Hapus Gambar</small>
        </div>
    </div>

    <button onclick="tambahKeAntrean()" class="btn-add-list">TAMBAH KE DAFTAR</button>

    <div class="antrean-container">
        <h4 id="judulAntrean">Daftar Antrean (0)</h4>
        <div id="listData"></div>
        <button id="btnKirimSemua" onclick="kirimSemuaKeSheets()" class="btn-kirim" style="display:none;">KIRIM SEMUA KE SHEETS</button>
    </div>
</div>

<script>
    // GANTI INI DENGAN URL /EXEC TERBARU DARI DEPLOYMENT KAMU
    const URL_APP = "https://script.google.com/macros/s/AKfycbzVIpOoO8ohu_brNbC8tBW_bChGQnay-tXoJ78IiWKGNPdUXtRDZrL_xGJiLIarkY77/exec";
    
    let currentBecomm = localStorage.getItem("myBecomm");
    let antrean = [];
    let currentBase64 = null;

    window.onload = function() {
        if (!currentBecomm) {
            setupBecomm();
        } else {
            document.getElementById("displayBecomm").innerText = "📍 " + currentBecomm;
            document.getElementById("tanggal").valueAsDate = new Date();
            loadNames();
        }
    };

    function setupBecomm() {
        const p = prompt("PILIH BECOMM:\nNEW NEW, ARISE, UNSHAKEN, PEARL, DIAMOND, CBG, SLG, CIMAHI, TELLYOU, OASIS, BETON");
        if (p) {
            localStorage.setItem("myBecomm", p.toUpperCase());
            location.reload();
        }
    }

    function gantiBecomm() {
        if(confirm("Ganti BECOMM saat ini?")) {
            localStorage.removeItem("myBecomm");
            setupBecomm();
        }
    }

    function bukaModal() { document.getElementById("modalNama").style.display = "block"; refreshListEksis(); }
    function tutupModal() { document.getElementById("modalNama").style.display = "none"; loadNames(); }

    function toggleUpload(val) {
        document.getElementById("uploadSection").style.display = (val === "TRANSFER") ? "block" : "none";
    }

    // KOMPRESI GAMBAR AGAR UPLOAD KILAT
    function handlePreview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 800;
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById("previewImg").src = compressedBase64;
                    document.getElementById("previewContainer").style.display = "block";
                    currentBase64 = compressedBase64;
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function resetFile() {
        document.getElementById("fileInput").value = "";
        document.getElementById("previewContainer").style.display = "none";
        currentBase64 = null;
    }

    function loadNames() {
        fetch(URL_APP, { method: "POST", body: JSON.stringify({ action: "getNames", becomm: currentBecomm }) })
        .then(res => res.json()).then(names => {
            const d = document.getElementById("namaDropdown");
            d.innerHTML = '<option value="">-- Pilih Nama --</option>';
            names.sort().forEach(n => { d.innerHTML += `<option value="${n}">${n}</option>`; });
        }).catch(err => console.log("Gagal load nama"));
    }

    function refreshListEksis() {
        const listDiv = document.getElementById("listNamaEksis");
        listDiv.innerHTML = "Memuat database...";
        fetch(URL_APP, { method: "POST", body: JSON.stringify({ action: "getNames", becomm: currentBecomm }) })
        .then(res => res.json()).then(names => {
            listDiv.innerHTML = names.sort().map(n => `
                <span class="name-tag">${n} <span class="del-name-btn" onclick="hapusNamaPermanen('${n}')">×</span></span>`).join("");
        });
    }

    function simpanNamaMassal() {
        const input = document.getElementById("bulkNama");
        const listNama = input.value.split("\n").map(n => n.trim().toUpperCase()).filter(n => n !== "");
        if (listNama.length === 0) return alert("Isi nama dulu!");
        
        const btn = document.getElementById("btnSimpanNama");
        btn.innerText = "Mengirim...";
        
        fetch(URL_APP, { method: "POST", body: JSON.stringify({ action: "addNamesBulk", becomm: currentBecomm, names: listNama }) })
        .then(() => { 
            input.value = ""; 
            btn.innerText = "SIMPAN KE DATABASE";
            refreshListEksis(); 
        });
    }

    function hapusNamaPermanen(nama) {
        if (confirm("Hapus " + nama + " dari database?")) {
            event.target.parentElement.style.opacity = "0.3";
            fetch(URL_APP, { method: "POST", body: JSON.stringify({ action: "deleteName", becomm: currentBecomm, nama: nama }) })
            .then(() => refreshListEksis());
        }
    }

    function tambahKeAntrean() {
        const nama = document.getElementById("namaDropdown").value;
        const nabung = document.getElementById("nabung").value;
        if (!nama || !nabung) return alert("Lengkapi data!");
        
        antrean.push({ 
            becomm: currentBecomm, 
            tanggal: document.getElementById("tanggal").value, 
            nama, nabung, 
            pembayaran: document.getElementById("pembayaran").value,
            imageBlob: currentBase64 
        });
        
        renderAntrean();
        resetFile();
        document.getElementById("nabung").value = "";
    }

    function renderAntrean() {
        const listDiv = document.getElementById("listData");
        document.getElementById("judulAntrean").innerText = `Daftar Antrean (${antrean.length})`;
        listDiv.innerHTML = antrean.map((item, i) => `
            <div class="item-antrean">
                <strong>${item.nama}</strong> - Rp ${parseInt(item.nabung).toLocaleString()}<br>
                <small>${item.pembayaran} ${item.imageBlob ? '🖼️ [DENGAN FOTO]' : ''}</small>
                <button class="btn-hapus" onclick="antrean.splice(${i},1);renderAntrean();">X</button>
            </div>`).join("");
        document.getElementById("btnKirimSemua").style.display = antrean.length > 0 ? "block" : "none";
    }

    function kirimSemuaKeSheets() {
        const btn = document.getElementById("btnKirimSemua");
        const originalText = btn.innerText;
        btn.innerText = "SEDANG MENGIRIM... JANGAN TUTUP HP";
        btn.disabled = true;
        
        fetch(URL_APP, { method: "POST", body: JSON.stringify({ action: "saveBulk", transactions: antrean }) })
        .then(res => res.text()).then(msg => {
            alert(msg); 
            antrean = []; 
            renderAntrean();
            btn.innerText = originalText;
            btn.disabled = false;
        })
        .catch(err => {
            alert("Terjadi kesalahan koneksi!");
            btn.disabled = false;
            btn.innerText = originalText;
        });
    }
</script>
</body>

</html>
